<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="strict-origin-when-cross-origin">

<title>Video Viewer</title>

<meta name="description" content="Open video content securely">
<meta name="robots" content="index,follow">

<meta property="og:title" content="Video Viewer">
<meta property="og:description" content="Tap to open video content">
<meta property="og:type" content="website">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#0f0f10;
    color:#fff;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

.card{
    width:100%;
    max-width:420px;
    background:#18181b;
    border:1px solid rgba(255,255,255,.08);
    border-radius:18px;
    padding:32px;
    text-align:center;
}

.loader{
    width:58px;
    height:58px;
    margin:0 auto 24px;
    border-radius:50%;
    border:4px solid rgba(255,255,255,.12);
    border-top:4px solid #fff;
    animation:spin 1s linear infinite;
}

h1{
    font-size:24px;
    margin-bottom:12px;
}

p{
    font-size:14px;
    color:rgba(255,255,255,.7);
    line-height:1;
    margin-bottom:15px;
}

button{
    width:100%;
    border:none;
    background:#fff;
    color:#111;
    padding:20px;
    border-radius:12px;
    font-weight:700;
    cursor:pointer;
    font-size:25px;
}

button:hover{
    opacity:.92;
}

.video-id{
    margin-top:16px;
    font-size:12px;
    color:rgba(255,255,255,.45);
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}
</style>
</head>
<body>

<div class="card">
    <div class="loader"></div>
    <h3>Video Ready</h3>
    <p>&darr;Tap below to continue&darr;</p>

    <button id="continueBtn">⇛ Open Video ⇚</button>

    <div class="video-id" id="videoInfo"></div>
</div>

<script>
const BLOG_BASE =
    "https://mogoflox.it.com/";

function getVideoId(){

    const params = new URLSearchParams(window.location.search);

    let id = params.get("id") || params.get("v");

    if(!id){
        const parts = window.location.pathname
            .split("/")
            .filter(Boolean);

        if(parts.length){
            id = parts[parts.length - 1];
        }
    }

    if(!id) return "";

    id = id
        .replace(".html","")
        .replace(".mp4","")
        .trim();

    if(!/^[a-zA-Z0-9_-]+$/.test(id)){
        return "";
    }

    return id;
}

const videoId = getVideoId();

if(videoId){
    document.getElementById("videoInfo").textContent =
        "Content ID: " + videoId;
}else{
    document.getElementById("videoInfo").textContent =
        "Invalid content ID";
}

document
.getElementById("continueBtn")
.addEventListener("click", function(){

    if(!videoId) return;

    window.location.href =
        BLOG_BASE +
        encodeURIComponent(videoId) +
        ".mp4";
});
</script>

</body>
</html>
